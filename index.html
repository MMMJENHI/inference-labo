<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Laboratoires</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #030712; color: #f3f4f6; font-family: 'JetBrains Mono', monospace; }
        .glass { background: #0f172a; border: 1px solid #1e293b; border-radius: 0.5rem; transition: all 0.3s; }
        .glass:hover { border-color: #3b82f6; transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="p-10">
    <div class="max-w-6xl mx-auto">
        <header class="mb-12 border-b border-gray-800 pb-6">
            <h1 class="text-3xl font-black text-white uppercase tracking-widest">Dashboard Laboratoires</h1>
            <p class="text-slate-500 text-sm mt-2">Station centrale de recherche et protocoles.</p>
        </header>

        <!-- Conteneur ciblé par le script -->
        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-6">
            <!-- Les cartes seront injectées ici -->
        </div>
    </div>

    <script>
        const dashboard = document.getElementById('dashboard');
        let htmlContent = '';

        // Boucle pour générer les 17 laboratoires
        for (let i = 1; i <= 17; i++) {
            const num = i < 10 ? '0' + i : i;
            htmlContent += `
                <a href="./labo${i}/index.html" class="glass p-6 block">
                    <h2 class="text-blue-400 font-bold mb-2">Labo ${num}</h2>
                    <p class="text-[10px] text-slate-400 uppercase">Protocole ${i}</p>
                </a>
            `;
        }
        
        // Injection sécurisée dans la page
        dashboard.innerHTML = htmlContent;
    </script>
</body>
</html>
